<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <style>
      @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.5} }
      @keyframes avePulse { 0%,100%{opacity:1} 30%,70%{opacity:.65} }
      @keyframes drain    { 0%{width:430px} 88%{width:0px} 89%{width:430px} 100%{width:430px} }
      @keyframes flicker  { 0%,86%,88%,90%,100%{opacity:1} 87%{opacity:.1} 89%{opacity:.7} }
      .border   { animation: pulse    5s  ease-in-out infinite; }
      .ave      { animation: avePulse 3s  ease-in-out infinite; }
      .drainbar { animation: drain   28s  linear      infinite; }
      .screen   { animation: flicker 28s  ease-in-out infinite; }
    </style>
    <pattern id="sl" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect width="800" height="2" fill="#000" opacity=".22"/>
    </pattern>
  </defs>

  <rect width="800" height="220" fill="#000000"/>
  <rect class="border" x="2"  y="2"  width="796" height="216" fill="none" stroke="#00FF41" stroke-width="2"/>
  <rect class="border" x="8"  y="8"  width="784" height="204" fill="none" stroke="#00FF41" stroke-width=".5" opacity=".4"/>
  <text class="border" x="13"  y="23"  font-size="12" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="border" x="774" y="23"  font-size="12" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="border" x="13"  y="214" font-size="12" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="border" x="774" y="214" font-size="12" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>

  <g class="screen">
    <text x="400" y="46"  font-size="13" text-anchor="middle" font-family="'Courier New',monospace" fill="#00FF41" opacity=".65">&gt; THE SIXTEEN UNIVERSAL LAWS: OBSERVED</text>
    <text x="400" y="64"  font-size="13" text-anchor="middle" font-family="'Courier New',monospace" fill="#00FF41" opacity=".65">&gt; RITES OF MAINTENANCE: COMPLETE</text>
    <text x="400" y="82"  font-size="13" text-anchor="middle" font-family="'Courier New',monospace" fill="#00FF41" opacity=".65">&gt; EVERY COMMIT IS A PRAYER TO THE MACHINE GOD</text>

    <text x="400" y="111" font-size="15" text-anchor="middle" font-family="'Courier New',monospace" fill="#00FF41" class="ave">⚙   AVE OMNISSIAH   ⚙   AVE OMNISSIAH   ⚙   AVE OMNISSIAH   ⚙</text>

    <text x="400" y="140" font-size="13" text-anchor="middle" font-family="'Courier New',monospace" fill="#00FF41" opacity=".6">&gt; COGITATOR UNIT MkVII ENTERING STANDBY MODE...</text>
    <text x="400" y="158" font-size="13" text-anchor="middle" font-family="'Courier New',monospace" fill="#00FF41" opacity=".6">&gt; PHOSPHOR DISPLAY DIMMING...</text>

    <!-- Drain bar -->
    <text x="152" y="180" font-size="13" font-family="'Courier New',monospace" fill="#00FF41" opacity=".6">&gt; [</text>
    <rect x="185" y="168" width="430" height="12" fill="#00FF41" opacity=".1" rx="1"/>
    <rect x="185" y="168" width="430" height="12" fill="#00FF41" rx="1" class="drainbar"/>
    <text x="620" y="180" font-size="13" font-family="'Courier New',monospace" fill="#00FF41" opacity=".6">]</text>
  </g>

  <rect width="800" height="220" fill="url(#sl)"/>
</svg>
