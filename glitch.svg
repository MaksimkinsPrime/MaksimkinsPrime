<svg xmlns="http://www.w3.org/2000/svg" width="800" height="230" viewBox="0 0 800 230">
  <defs>
    <style>
      @keyframes flicker {
        0%,83%,85%,87%,89%,100% { opacity: 1; }
        84% { opacity: 0.15; }
        86% { opacity: 0.75; }
        88% { opacity: 0.08; }
      }
      @keyframes glitch {
        0%,91%,96%,100% { transform: translateX(0); opacity: 0; }
        92%,93%       { transform: translateX(-9px); opacity: 0.65; }
        94%,95%       { transform: translateX(7px);  opacity: 0.5;  }
      }
      @keyframes glitch2 {
        0%,91%,96%,100% { transform: translateX(0); opacity: 0; }
        92%             { transform: translateX(9px);  opacity: 0.4; }
        93%,94%         { transform: translateX(-5px); opacity: 0.55; }
        95%             { transform: translateX(3px);  opacity: 0.3; }
      }
      @keyframes scan {
        0%   { transform: translateY(-4px); }
        100% { transform: translateY(234px); }
      }
      @keyframes blink {
        0%,49%  { opacity: 1; }
        50%,100%{ opacity: 0; }
      }
      @keyframes borderPulse {
        0%,100% { opacity: 1;   }
        50%     { opacity: 0.55; }
      }
      @keyframes cogSpin {
        0%   { transform: rotate(0deg);   }
        100% { transform: rotate(360deg); }
      }
      .screen        { animation: flicker 11s ease-in-out infinite; }
      .glitch-cyan   { animation: glitch  11s ease-in-out infinite; }
      .glitch-magenta{ animation: glitch2 11s ease-in-out infinite; }
      .scanline      { animation: scan 4.5s linear infinite; }
      .cursor        { animation: blink 1s step-end infinite; }
      .border-outer  { animation: borderPulse 4s ease-in-out infinite; }
      .border-inner  { animation: borderPulse 4s ease-in-out infinite 0.5s; }
    </style>

    <pattern id="scanlines" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="800" height="2" fill="#000000" opacity="0.28"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="230" fill="#000000"/>

  <!-- Borders -->
  <rect class="border-outer" x="2"  y="2"  width="796" height="226" fill="none" stroke="#00FF41" stroke-width="2"/>
  <rect class="border-inner" x="8"  y="8"  width="784" height="214" fill="none" stroke="#00FF41" stroke-width="0.5" opacity="0.45"/>

  <!-- Corner cogs -->
  <text class="border-outer" x="13"  y="24"  font-size="13" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="border-outer" x="773" y="24"  font-size="13" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="border-outer" x="13"  y="222" font-size="13" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="border-outer" x="773" y="222" font-size="13" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>

  <!-- Main screen content with flicker -->
  <g class="screen">

    <!-- Chromatic aberration: red ghost -->
    <text x="403" y="53" font-size="13" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#FF2200" opacity="0.3">
      ▓ ADEPTUS MECHANICUS ▓  COGITATOR UNIT MkVII  ▓  BUILD M2.026 ▓
    </text>
    <!-- Chromatic aberration: blue ghost -->
    <text x="397" y="53" font-size="13" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#001EFF" opacity="0.2">
      ▓ ADEPTUS MECHANICUS ▓  COGITATOR UNIT MkVII  ▓  BUILD M2.026 ▓
    </text>
    <!-- Main title -->
    <text x="400" y="53" font-size="13" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00FF41">
      ▓ ADEPTUS MECHANICUS ▓  COGITATOR UNIT MkVII  ▓  BUILD M2.026 ▓
    </text>

    <!-- Divider -->
    <text x="400" y="72" font-size="11" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00FF41" opacity="0.45">
      ════════════════════════════════════════════════════════════════
    </text>

    <!-- Rank — primary -->
    <text x="401" y="103" font-size="19" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00CC33" opacity="0.35">
      MASTER OF THE FORGE
    </text>
    <text x="400" y="102" font-size="19" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00FF41" font-weight="bold">
      MASTER OF THE FORGE
    </text>

    <!-- Info -->
    <text x="400" y="126" font-size="11" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00FF41" opacity="0.72">
      CLEARANCE: VERMILLION  ·  ORDAINED ENGINSEER  ·  UNIT PRIME  ·  MECHADENDRITES: 8 ACTIVE
    </text>

    <!-- Binary -->
    <text x="400" y="149" font-size="10" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00FF41" opacity="0.4">
      01001101 01000001 01010011 01010100 01000101 01010010  ·  0xDEADBEEF
    </text>

    <!-- Divider -->
    <text x="400" y="168" font-size="11" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00FF41" opacity="0.45">
      ════════════════════════════════════════════════════════════════
    </text>

    <!-- Litany -->
    <text x="400" y="195" font-size="15" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00FF41">
      ⚙  AVE OMNISSIAH  ⚙  AVE OMNISSIAH  ⚙  AVE OMNISSIAH  ⚙
    </text>

    <!-- Status line -->
    <text x="400" y="215" font-size="9" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00FF41" opacity="0.38">
      MACHINE SPIRIT: ONLINE  ·  ALL SYSTEMS NOMINAL  ·  OMNISSIAH VULT
    </text>
  </g>

  <!-- Glitch layer: cyan -->
  <g class="glitch-cyan">
    <text x="400" y="102" font-size="19" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00FFFF" font-weight="bold">
      MASTER OF THE FORGE
    </text>
    <text x="400" y="53" font-size="13" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#00FFFF" opacity="0.55">
      ▓ ADEPTUS MECHANICUS ▓  COGITATOR UNIT MkVII  ▓  BUILD M2.026 ▓
    </text>
  </g>

  <!-- Glitch layer: magenta -->
  <g class="glitch-magenta">
    <text x="400" y="102" font-size="19" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" fill="#FF00FF" opacity="0.5" font-weight="bold">
      MASTER OF THE FORGE
    </text>
  </g>

  <!-- Scanlines overlay (static) -->
  <rect width="800" height="230" fill="url(#scanlines)"/>

  <!-- Moving bright scanline -->
  <g class="scanline">
    <rect x="0" y="0" width="800" height="3" fill="#00FF41" opacity="0.07"/>
  </g>

</svg>
