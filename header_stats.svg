<svg xmlns="http://www.w3.org/2000/svg" width="800" height="65" viewBox="0 0 800 65">
  <defs>
    <style>
      @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:.5} }
      @keyframes heartbeat {
        0%,100%   { opacity:1;   }
        12%       { opacity:.45; }
        22%       { opacity:1;   }
        36%       { opacity:.45; }
        46%,90%   { opacity:1;   }
      }
      @keyframes blink     { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .border  { animation: pulse     5s ease-in-out infinite; }
      .text    { animation: heartbeat 2.8s ease-in-out infinite; }
      .dot     { animation: blink     1s step-end infinite; }
    </style>
    <pattern id="sl" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect width="800" height="2" fill="#000" opacity=".22"/>
    </pattern>
  </defs>

  <rect width="800" height="65" fill="#000000"/>
  <rect class="border" x="2" y="2" width="796" height="61" fill="none" stroke="#00FF41" stroke-width="1.5"/>
  <rect class="border" x="6" y="6" width="788" height="53" fill="none" stroke="#00FF41" stroke-width=".4" opacity=".35"/>

  <!-- Corner cogs -->
  <text class="border" x="13" y="22" font-size="11" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="border" x="774" y="22" font-size="11" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>

  <!-- Main text with heartbeat -->
  <text x="34" y="35" font-size="13" font-family="'Courier New',monospace" fill="#00FF41" class="text">&gt; COGITATOR READOUTS — DAILY BINARIC MANIFEST:</text>

  <!-- Signal indicator: blinking dot + label -->
  <text x="608" y="35" font-size="13" font-family="'Courier New',monospace" fill="#00FF41" class="dot">◉</text>
  <text x="626" y="35" font-size="13" font-family="'Courier New',monospace" fill="#00FF41" opacity=".75">SIGNAL ACTIVE</text>

  <!-- Separator line -->
  <text x="34" y="52" font-size="9" font-family="'Courier New',monospace" fill="#00FF41" opacity=".25">────────────────────────────────────────────────────────────────────────────────────────────</text>

  <rect width="800" height="65" fill="url(#sl)"/>
</svg>
