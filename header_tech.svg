<svg xmlns="http://www.w3.org/2000/svg" width="800" height="65" viewBox="0 0 800 65">
  <defs>
    <style>
      @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.5} }
      @keyframes sweep  { 0%{transform:translateX(-5px)} 100%{transform:translateX(810px)} }
      @keyframes fillX  { 0%,4%{transform:scaleX(0)} 70%{transform:scaleX(1)} 85%,100%{transform:scaleX(1)} }
      .border { animation: pulse 5s ease-in-out infinite; }
      .sweep  { animation: sweep 3.5s linear infinite; }
      .bar    { transform-origin: left center; animation: fillX 4s ease-out infinite; }
    </style>
    <pattern id="sl" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect width="800" height="2" fill="#000" opacity=".22"/>
    </pattern>
  </defs>

  <rect width="800" height="65" fill="#000000"/>
  <rect class="border" x="2" y="2" width="796" height="61" fill="none" stroke="#00FF41" stroke-width="1.5"/>
  <rect class="border" x="6" y="6" width="788" height="53" fill="none" stroke="#00FF41" stroke-width=".4" opacity=".35"/>

  <!-- Horizontal sweep -->
  <g class="sweep">
    <rect x="0" y="0" width="3" height="65" fill="#00FF41" opacity="0.18"/>
  </g>

  <!-- Corner cogs -->
  <text class="border" x="13" y="22" font-size="11" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="border" x="774" y="22" font-size="11" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>

  <!-- Main text -->
  <text x="34" y="35" font-size="13" font-family="'Courier New',monospace" fill="#00FF41">&gt; MECHADENDRITE ARRAY — LOADING BINHARIC PROTOCOLS...</text>

  <!-- Loading bar track + fill -->
  <rect x="34" y="47" width="732" height="3" fill="#00FF41" opacity=".1" rx="1"/>
  <rect x="34" y="47" width="732" height="3" fill="#00FF41" rx="1" class="bar"/>

  <rect width="800" height="65" fill="url(#sl)"/>
</svg>
