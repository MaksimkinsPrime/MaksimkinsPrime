  <text x="415" y="220" font-size="11" font-family="'Courier New',monospace" fill="#00FF41">DOCKER</text>
  <rect x="572" y="209" width="210" height="12" fill="#00FF41" opacity=".1" rx="1"/>
  <rect x="572" y="209" width="0"   height="12" fill="#00FF41" rx="1">
    <animate attributeName="width" from="0" to="116" dur="1.4s" begin="0.9s" fill="freeze" calcMode="spline" keySplines=".4 0 .2 1" keyTimes="0;1"/>
