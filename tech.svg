  <!-- Row 5: POSTGRESQL 58% -->
  <text x="415" y="260" font-size="11" font-family="'Courier New',monospace" fill="#00FF41">POSTGRESQL</text>
  <rect x="572" y="249" width="210" height="12" fill="#00FF41" opacity=".1" rx="1"/>
  <rect x="572" y="249" width="0"   height="12" fill="#00FF41" rx="1">
    <animate attributeName="width" from="0" to="122" dur="1.4s" begin="1.1s" fill="freeze" calcMode="spline" keySplines=".4 0 .2 1" keyTimes="0;1"/>
  </rect>
  <text x="788" y="260" font-size="10" text-anchor="end" font-family="'Courier New',monospace" fill="#00FF41">58%</text>

  <!-- Row 6: n8n 72% -->
  <text x="415" y="300" font-size="11" font-family="'Courier New',monospace" fill="#00FF41">n8n</text>
  <rect x="572" y="289" width="210" height="12" fill="#00FF41" opacity=".1" rx="1"/>
  <rect x="572" y="289" width="0"   height="12" fill="#00FF41" rx="1">
    <animate attributeName="width" from="0" to="151" dur="1.4s" begin="1.3s" fill="freeze" calcMode="spline" keySplines=".4 0 .2 1" keyTimes="0;1"/>
