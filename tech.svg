  <!-- Row 7: FLASK 58% -->
  <text x="415" y="340" font-size="11" font-family="'Courier New',monospace" fill="#00FF41">FLASK</text>
  <rect x="572" y="329" width="210" height="12" fill="#00FF41" opacity=".1" rx="1"/>
  <rect x="572" y="329" width="0"   height="12" fill="#00FF41" rx="1">
    <animate attributeName="width" from="0" to="122" dur="1.4s" begin="1.5s" fill="freeze" calcMode="spline" keySplines=".4 0 .2 1" keyTimes="0;1"/>
