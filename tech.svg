  <rect x="572" y="169" width="0"   height="12" fill="#00FF41" rx="1">
    <animate attributeName="width" from="0" to="168" dur="1.4s" begin="0.7s" fill="freeze" calcMode="spline" keySplines=".4 0 .2 1" keyTimes="0;1"/>
