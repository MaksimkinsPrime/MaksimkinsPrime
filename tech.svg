  <rect x="168" y="249" width="215" height="12" fill="#00FF41" opacity=".1" rx="1"/>
  <rect x="168" y="249" width="0"   height="12" fill="#00FF41" rx="1">
    <animate attributeName="width" from="0" to="54" dur="1.4s" begin="1.0s" fill="freeze" calcMode="spline" keySplines=".4 0 .2 1" keyTimes="0;1"/>
