  <!-- Row 1: PYTHON 92% -->
  <text x="30" y="100" font-size="11" font-family="'Courier New',monospace" fill="#00FF41">PYTHON</text>
  <rect x="168" y="89" width="215" height="12" fill="#00FF41" opacity=".1" rx="1"/>
  <rect x="168" y="89" width="0"   height="12" fill="#00FF41" rx="1">
    <animate attributeName="width" from="0" to="198" dur="1.4s" begin="0.2s" fill="freeze" calcMode="spline" keySplines=".4 0 .2 1" keyTimes="0;1"/>
  </rect>
  <text x="390" y="100" font-size="10" text-anchor="end" font-family="'Courier New',monospace" fill="#00FF41">92%</text>

  <!-- Row 2: C / C# 60% -->
  <text x="30" y="140" font-size="11" font-family="'Courier New',monospace" fill="#00FF41">C / C#</text>
  <rect x="168" y="129" width="215" height="12" fill="#00FF41" opacity=".1" rx="1"/>
  <rect x="168" y="129" width="0"   height="12" fill="#00FF41" rx="1">
    <animate attributeName="width" from="0" to="129" dur="1.4s" begin="0.4s" fill="freeze" calcMode="spline" keySplines=".4 0 .2 1" keyTimes="0;1"/>
