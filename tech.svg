  <!-- Footer -->
  <text x="400" y="374" font-size="9" text-anchor="middle" font-family="'Courier New',monospace" fill="#00FF41" opacity=".38">ALL PROTOCOLS LOADED — MACHINE SPIRIT SYNCHRONIZED — AWAITING ORDERS</text>

  <!-- Overlay -->
  <rect width="800" height="400" fill="url(#sl)"/>
  <g class="scanline"><rect x="0" y="0" width="800" height="3" fill="#00FF41" opacity=".06"/></g>
  <text x="18" y="390" font-size="12" font-family="'Courier New',monospace" fill="#00FF41" class="cursor">█</text>
