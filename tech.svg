<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <style>
      @keyframes borderPulse { 0%,100%{opacity:1} 50%{opacity:.55} }
      @keyframes scan { 0%{transform:translateY(-4px)} 100%{transform:translateY(404px)} }
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .b { animation: borderPulse 4s ease-in-out infinite; }
      .scanline { animation: scan 4.5s linear infinite; }
      .cursor { animation: blink 1s step-end infinite; }
    </style>
    <pattern id="sl" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="800" height="2" fill="#000" opacity=".25"/>
    </pattern>
  </defs>

  <rect width="800" height="400" fill="#000"/>
  <rect class="b" x="2" y="2" width="796" height="396" fill="none" stroke="#00FF41" stroke-width="2"/>
  <rect class="b" x="8" y="8" width="784" height="384" fill="none" stroke="#00FF41" stroke-width=".5" opacity=".4"/>
  <text class="b" x="13"  y="24"  font-size="13" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="b" x="773" y="24"  font-size="13" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="b" x="13"  y="392" font-size="13" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>
  <text class="b" x="773" y="392" font-size="13" font-family="'Courier New',monospace" fill="#00FF41">⚙</text>

  <!-- Title -->
  <text x="400" y="40" font-size="13" text-anchor="middle" font-family="'Courier New',monospace" fill="#00FF41">▓ MECHADENDRITE ARRAY — BINHARIC PROTOCOL STATUS ▓</text>
  <text x="400" y="56" font-size="10" text-anchor="middle" font-family="'Courier New',monospace" fill="#00FF41" opacity=".4">════════════════════════════════════════════════════════════════</text>

  <!-- Column headers -->
  <text x="30"  y="74" font-size="10" font-family="'Courier New',monospace" fill="#00FF41" opacity=".6">// PRIMARY LANGUAGES</text>
  <text x="415" y="74" font-size="10" font-family="'Courier New',monospace" fill="#00FF41" opacity=".6">// LIBRARIES + TOOLS</text>

  <!-- Vertical divider -->
  <line x1="402" y1="62" x2="402" y2="378" stroke="#00FF41" stroke-width=".5" opacity=".25"/>

