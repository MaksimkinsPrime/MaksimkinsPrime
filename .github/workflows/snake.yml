name: Generate Snake Animation

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00FF41&color_dots[0]=000000&color_dots[1]=001a00&color_dots[2]=003300&color_dots[3]=006600&color_dots[4]=00AA00

      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || (git commit -m "chore: Servo-Skull patrol complete — snake updated" && git push)
